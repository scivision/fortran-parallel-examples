name: cmake

env:
  CTEST_NO_TESTS_ACTION: error
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja

on:
  push:
    paths:
      - "**.f90"
      - "**.F90"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/cmake.yml"


jobs:

  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
    - &checkout
      uses: actions/checkout@v5

    - &default
      run: cmake --workflow default


  mac:
    runs-on: macos-latest
    timeout-minutes: 10

    strategy:
      matrix:
        fc: [flang, gfortran-15]

    env:
      FC: ${{ matrix.fc }}

    steps:
    - name: prereqs
      if: ${{ matrix.fc == 'flang' }}
      run: |
        brew install flang libomp
        echo "OpenMP_ROOT=$(brew --prefix)/opt/libomp" >> $GITHUB_ENV
        echo "LDFLAGS=-L$(brew --prefix)/opt/libomp/lib" >> $GITHUB_ENV

    - *checkout

    - *default

    - name: upload CMakeConfigureLog.yaml
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ matrix.fc }}-CMakeConfigureLog.yaml
        path: build/CMakeFiles/CMakeConfigureLog.yaml


  windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc-fortran

    - name: Put MSYS2_MinGW64 on PATH
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - *checkout

    - *default
